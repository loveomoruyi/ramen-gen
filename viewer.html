    &lt;script&gt;
    var currentItem = { name: &quot;&quot;, price: 0 };

    function openQuantityModal(btn) {
        var card = btn.closest(&quot;.menu-card&quot;);
        var name = card.querySelector(&quot;h4&quot;).textContent;
        var priceText = card.querySelector(&quot;.price&quot;).textContent;
        var price = parseFloat(priceText.replace(&quot;$&quot;, &quot;&quot;));
        currentItem = { name: name, price: price };
        document.getElementById(&quot;modal-item-name&quot;).textContent = name;
        document.getElementById(&quot;modal-item-price&quot;).textContent = priceText;
        document.getElementById(&quot;modal-qty&quot;).value = 1;
        document.getElementById(&quot;modal-line-total&quot;).textContent = &quot;Total: &quot; + priceText;
        document.getElementById(&quot;quantity-modal&quot;).style.display = &quot;flex&quot;;
    }

    function closeQuantityModal() {
        document.getElementById(&quot;quantity-modal&quot;).style.display = &quot;none&quot;;
    }

    function adjustModalQty(delta) {
        var input = document.getElementById(&quot;modal-qty&quot;);
        var val = parseInt(input.value) || 1;
        val = Math.max(1, Math.min(20, val + delta));
        input.value = val;
        var total = (currentItem.price * val).toFixed(2);
        document.getElementById(&quot;modal-line-total&quot;).textContent = &quot;Total: $&quot; + total;
    }

    document.addEventListener(&quot;DOMContentLoaded&quot;, function() {
        var qtyInput = document.getElementById(&quot;modal-qty&quot;);
        if (qtyInput) {
            qtyInput.addEventListener(&quot;input&quot;, function() {
                var val = parseInt(this.value) || 1;
                val = Math.max(1, Math.min(20, val));
                this.value = val;
                var total = (currentItem.price * val).toFixed(2);
                document.getElementById(&quot;modal-line-total&quot;).textContent = &quot;Total: $&quot; + total;
            });
        }
        var overlay = document.getElementById(&quot;quantity-modal&quot;);
        if (overlay) {
            overlay.addEventListener(&quot;click&quot;, function(e) {
                if (e.target === this) closeQuantityModal();
            });
        }
        var params = new URLSearchParams(window.location.search);
        if (params.get(&quot;order&quot;) === &quot;true&quot;) {
            var banner = document.createElement(&quot;div&quot;);
            banner.className = &quot;order-mode-banner&quot;;
            banner.innerHTML = &#x27;&lt;span&gt;&amp;#127836; Ordering Mode&lt;/span&gt; Select items below, then &lt;a href=&quot;/pages/order&quot; class=&quot;btn-back-to-order&quot;&gt;View Your Order &amp;rarr;&lt;/a&gt;&#x27;;
            var main = document.querySelector(&quot;main&quot;) || document.querySelector(&quot;.menu-section&quot;);
            if (main) main.insertBefore(banner, main.firstChild);
        }
    });

    function confirmAddToOrder() {
        var qty = parseInt(document.getElementById(&quot;modal-qty&quot;).value) || 1;
        var item = { name: currentItem.name, price: currentItem.price, qty: qty };
        var cart = JSON.parse(localStorage.getItem(&quot;ramenJinCart&quot;) || &quot;[]&quot;);
        var found = false;
        for (var i = 0; i &lt; cart.length; i++) {
            if (cart[i].name === item.name) {
                cart[i].qty += qty;
                found = true;
                break;
            }
        }
        if (!found) cart.push(item);
        localStorage.setItem(&quot;ramenJinCart&quot;, JSON.stringify(cart));
        closeQuantityModal();
        showOrderToast(item.name + &quot; (x&quot; + qty + &quot;) added to order!&quot;);
            if (typeof CartWidget !== &#x27;undefined&#x27;) { CartWidget.show(item.name, qty); }
    }

    function showOrderToast(message) {
        var toast = document.getElementById(&quot;order-toast&quot;);
        if (!toast) {
            toast = document.createElement(&quot;div&quot;);
            toast.id = &quot;order-toast&quot;;
            toast.className = &quot;order-toast&quot;;
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.classList.add(&quot;show&quot;);
        setTimeout(function() { toast.classList.remove(&quot;show&quot;); }, 2500);
    }

<textarea id="cart-widget.js" rows="10" cols="120" style="width:100%;font-family:monospace;font-size:12px;">/* ============================================
   Ramen Jin - Floating Cart Widget
   Animated floating button &amp; pop-up panel
   ============================================ */

(function() {
  &#x27;use strict&#x27;;

  function getCart() {
    return JSON.parse(localStorage.getItem(&#x27;ramenJinCart&#x27;) || &#x27;[]&#x27;);
  }

  function saveCart(cart) {
    localStorage.setItem(&#x27;ramenJinCart&#x27;, JSON.stringify(cart));
  }

  function getCartTotal() {
    var cart = getCart();
    var total = 0;
    for (var i = 0; i &lt; cart.length; i++) {
      total += cart[i].price * cart[i].qty;
    }
    return total;
  }

  function getCartCount() {
    var cart = getCart();
    var count = 0;
    for (var i = 0; i &lt; cart.length; i++) {
      count += cart[i].qty;
    }
    return count;
  }

  function escapeHtml(str) {
    var div = document.createElement(&#x27;div&#x27;);
    div.textContent = str;
    return div.innerHTML;
  }

  function createWidgetHTML() {
    var container = document.createElement(&#x27;div&#x27;);
    container.id = &#x27;cart-widget-container&#x27;;

    var btn = document.createElement(&#x27;button&#x27;);
    btn.id = &#x27;cart-widget-btn&#x27;;
    btn.setAttribute(&#x27;aria-label&#x27;, &#x27;View Cart&#x27;);
    btn.innerHTML = &#x27;&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;28&quot; height=&quot;28&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;&gt;&lt;circle cx=&quot;9&quot; cy=&quot;21&quot; r=&quot;1&quot;/&gt;&lt;circle cx=&quot;20&quot; cy=&quot;21&quot; r=&quot;1&quot;/&gt;&lt;path d=&quot;M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6&quot;/&gt;&lt;/svg&gt;&#x27;;

    var badge = document.createElement(&#x27;span&#x27;);
    badge.id = &#x27;cart-widget-badge&#x27;;
    badge.className = &#x27;hidden&#x27;;
    badge.textContent = &#x27;0&#x27;;
    btn.appendChild(badge);
    container.appendChild(btn);

    var panel = document.createElement(&#x27;div&#x27;);
    panel.id = &#x27;cart-widget-panel&#x27;;
    panel.className = &#x27;cart-widget-panel-hidden&#x27;;

    var header = document.createElement(&#x27;div&#x27;);
    header.className = &#x27;cart-widget-header&#x27;;
    header.innerHTML = &#x27;&lt;h3 class=&quot;cart-widget-title&quot;&gt;\ud83c\udf5c Your Order&lt;/h3&gt;&lt;button id=&quot;cart-widget-close&quot; class=&quot;cart-widget-close-btn&quot; aria-label=&quot;Close&quot;&gt;&amp;times;&lt;/button&gt;&#x27;;
    panel.appendChild(header);

    var itemsList = document.createElement(&#x27;div&#x27;);
    itemsList.id = &#x27;cart-widget-items&#x27;;
    itemsList.className = &#x27;cart-widget-items&#x27;;
    panel.appendChild(itemsList);

    var footer = document.createElement(&#x27;div&#x27;);
    footer.className = &#x27;cart-widget-footer&#x27;;

    var totalRow = document.createElement(&#x27;div&#x27;);
    totalRow.className = &#x27;cart-widget-total&#x27;;
    totalRow.innerHTML = &#x27;&lt;span&gt;Subtotal:&lt;/span&gt;&lt;span id=&quot;cart-widget-subtotal&quot;&gt;$0.00&lt;/span&gt;&#x27;;
    footer.appendChild(totalRow);

    var actions = document.createElement(&#x27;div&#x27;);
    actions.className = &#x27;cart-widget-actions&#x27;;

    var viewBtn = document.createElement(&#x27;a&#x27;);
    viewBtn.id = &#x27;cart-widget-view-btn&#x27;;
    viewBtn.href = &#x27;order.html&#x27;;
    viewBtn.className = &#x27;cart-widget-action-btn cart-widget-view&#x27;;
    viewBtn.innerHTML = &#x27;&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;&gt;&lt;path d=&quot;M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z&quot;/&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;3&quot;/&gt;&lt;/svg&gt; View Selected Items&#x27;;

    var checkoutBtn = document.createElement(&#x27;a&#x27;);
    checkoutBtn.id = &#x27;cart-widget-checkout-btn&#x27;;
    checkoutBtn.href = &#x27;payment.html&#x27;;
    checkoutBtn.className = &#x27;cart-widget-action-btn cart-widget-checkout&#x27;;
    checkoutBtn.innerHTML = &#x27;&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;&gt;&lt;rect x=&quot;1&quot; y=&quot;4&quot; width=&quot;22&quot; height=&quot;16&quot; rx=&quot;2&quot; ry=&quot;2&quot;/&gt;&lt;line x1=&quot;1&quot; y1=&quot;10&quot; x2=&quot;23&quot; y2=&quot;10&quot;/&gt;&lt;/svg&gt; Go to Cart / Checkout&#x27;;

    actions.appendChild(viewBtn);
    actions.appendChild(checkoutBtn);
    footer.appendChild(actions);
    panel.appendChild(footer);

    var emptyState = document.createElement(&#x27;div&#x27;);
    emptyState.id = &#x27;cart-widget-empty&#x27;;
    emptyState.className = &#x27;cart-widget-empty&#x27;;
    emptyState.innerHTML = &#x27;&lt;p&gt;Your cart is empty&lt;/p&gt;&lt;p style=&quot;font-size:12px;color:#888;&quot;&gt;Add some delicious ramen!&lt;/p&gt;&#x27;;
    panel.appendChild(emptyState);

    container.appendChild(panel);

    var toast = document.createElement(&#x27;div&#x27;);
    toast.id = &#x27;cart-widget-toast&#x27;;
    toast.className = &#x27;cart-widget-toast&#x27;;
    container.appendChild(toast);

    return container;
  }

  function renderWidgetItems() {
    var cart = getCart();
    var itemsEl = document.getElementById(&#x27;cart-widget-items&#x27;);
    var emptyEl = document.getElementById(&#x27;cart-widget-empty&#x27;);
    var subtotalEl = document.getElementById(&#x27;cart-widget-subtotal&#x27;);
    var footerActions = document.querySelector(&#x27;.cart-widget-actions&#x27;);
    var totalRow = document.querySelector(&#x27;.cart-widget-total&#x27;);

    if (!itemsEl) return;

    if (cart.length === 0) {
      itemsEl.style.display = &#x27;none&#x27;;
      if (emptyEl) emptyEl.style.display = &#x27;flex&#x27;;
      if (footerActions) footerActions.style.display = &#x27;none&#x27;;
      if (totalRow) totalRow.style.display = &#x27;none&#x27;;
      if (subtotalEl) subtotalEl.textContent = &#x27;$0.00&#x27;;
      return;
    }

    itemsEl.style.display = &#x27;block&#x27;;
    if (emptyEl) emptyEl.style.display = &#x27;none&#x27;;
    if (footerActions) footerActions.style.display = &#x27;flex&#x27;;
    if (totalRow) totalRow.style.display = &#x27;flex&#x27;;

    var html = &#x27;&#x27;;
    for (var i = 0; i &lt; cart.length; i++) {
      var item = cart[i];
      html += &#x27;&lt;div class=&quot;cart-widget-item&quot; data-index=&quot;&#x27; + i + &#x27;&quot;&gt;&#x27; +
        &#x27;&lt;div class=&quot;cart-widget-item-info&quot;&gt;&#x27; +
          &#x27;&lt;div class=&quot;cart-widget-item-name&quot;&gt;&#x27; + escapeHtml(item.name) + &#x27;&lt;/div&gt;&#x27; +
          &#x27;&lt;div class=&quot;cart-widget-item-details&quot;&gt;&#x27; +
            &#x27;&lt;span class=&quot;cart-widget-item-qty&quot;&gt;Qty: &#x27; + item.qty + &#x27;&lt;/span&gt; &amp;middot; &#x27; +
            &#x27;&lt;span class=&quot;cart-widget-item-price&quot;&gt;$&#x27; + (item.price * item.qty).toFixed(2) + &#x27;&lt;/span&gt;&#x27; +
          &#x27;&lt;/div&gt;&#x27; +
        &#x27;&lt;/div&gt;&#x27; +
        &#x27;&lt;button class=&quot;cart-widget-remove-btn&quot; data-index=&quot;&#x27; + i + &#x27;&quot; aria-label=&quot;Remove&quot;&gt;&#x27; +
          &#x27;&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;14&quot; height=&quot;14&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;&gt;&lt;line x1=&quot;18&quot; y1=&quot;6&quot; x2=&quot;6&quot; y2=&quot;18&quot;/&gt;&lt;line x1=&quot;6&quot; y1=&quot;6&quot; x2=&quot;18&quot; y2=&quot;18&quot;/&gt;&lt;/svg&gt;&#x27; +
        &#x27;&lt;/button&gt;&#x27; +
      &#x27;&lt;/div&gt;&#x27;;
    }
    itemsEl.innerHTML = html;

    if (subtotalEl) {
      subtotalEl.textContent = &#x27;$&#x27; + getCartTotal().toFixed(2);
    }

    var removeBtns = itemsEl.querySelectorAll(&#x27;.cart-widget-remove-btn&#x27;);
    for (var j = 0; j &lt; removeBtns.length; j++) {
      removeBtns[j].addEventListener(&#x27;click&#x27;, function(e) {
        e.stopPropagation();
        var idx = parseInt(this.getAttribute(&#x27;data-index&#x27;));
        removeWidgetItem(idx);
      });
    }
  }

  function removeWidgetItem(index) {
    var cart = getCart();
    if (index &gt;= 0 &amp;&amp; index &lt; cart.length) {
      cart.splice(index, 1);
      saveCart(cart);
      renderWidgetItems();
      updateBadge();
      if (typeof window.renderCart === &#x27;function&#x27;) {
        window.renderCart();
      }
    }
  }

  function updateBadge() {
    var badge = document.getElementById(&#x27;cart-widget-badge&#x27;);
    var btn = document.getElementById(&#x27;cart-widget-btn&#x27;);
    if (!badge) return;

    var count = getCartCount();
    badge.textContent = count;

    if (count &gt; 0) {
      badge.classList.remove(&#x27;hidden&#x27;);
      if (btn) btn.style.display = &#x27;flex&#x27;;
    } else {
      badge.classList.add(&#x27;hidden&#x27;);
    }
  }

  var panelOpen = false;

  function togglePanel() {
    if (panelOpen) {
      closePanel();
    } else {
      openPanel();
    }
  }

  function openPanel() {
    var panel = document.getElementById(&#x27;cart-widget-panel&#x27;);
    if (!panel) return;
    renderWidgetItems();
    panel.classList.remove(&#x27;cart-widget-panel-hidden&#x27;);
    panel.classList.add(&#x27;cart-widget-panel-visible&#x27;);
        panel.classList.add(&#x27;open&#x27;);
    panelOpen = true;
  }

  function closePanel() {
    var panel = document.getElementById(&#x27;cart-widget-panel&#x27;);
    if (!panel) return;
    panel.classList.remove(&#x27;cart-widget-panel-visible&#x27;);
    panel.classList.add(&#x27;cart-widget-panel-hidden&#x27;);
        panel.classList.remove(&#x27;open&#x27;);
    panelOpen = false;
  }

  function showWidgetToast(itemName, qty) {
    var toast = document.getElementById(&#x27;cart-widget-toast&#x27;);
    if (!toast) return;

    toast.innerHTML = &#x27;&lt;div class=&quot;cart-widget-toast-icon&quot;&gt;&#x27; +
      &#x27;&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;20&quot; height=&quot;20&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;3&quot;&gt;&lt;polyline points=&quot;20 6 9 17 4 12&quot;/&gt;&lt;/svg&gt;&#x27; +
      &#x27;&lt;/div&gt;&#x27; +
      &#x27;&lt;div class=&quot;cart-widget-toast-text&quot;&gt;&#x27; +
        &#x27;&lt;strong&gt;&#x27; + escapeHtml(itemName) + &#x27;&lt;/strong&gt;&#x27; +
        &#x27;&lt;span&gt; (x&#x27; + qty + &#x27;) added!&lt;/span&gt;&#x27; +
      &#x27;&lt;/div&gt;&#x27;;

    toast.classList.add(&#x27;cart-widget-toast-show&#x27;);

    var btn = document.getElementById(&#x27;cart-widget-btn&#x27;);
    if (btn) {
      btn.classList.add(&#x27;pulse&#x27;);
      setTimeout(function() { btn.classList.remove(&#x27;pulse&#x27;); }, 600);
    }

    setTimeout(function() {
      openPanel();
    }, 400);

    setTimeout(function() {
      toast.classList.remove(&#x27;cart-widget-toast-show&#x27;);
    }, 3000);
  }

  function initCartWidget() {
    var path = window.location.pathname;
    if (path.indexOf(&#x27;payment.html&#x27;) &gt; -1 || path.indexOf(&#x27;receipt.html&#x27;) &gt; -1) return;

    var widget = createWidgetHTML();
    document.body.appendChild(widget);

    var btn = document.getElementById(&#x27;cart-widget-btn&#x27;);
    if (btn) {
      btn.addEventListener(&#x27;click&#x27;, function(e) {
        e.preventDefault();
        e.stopPropagation();
        togglePanel();
      });
    }

    var closeBtn = document.getElementById(&#x27;cart-widget-close&#x27;);
    if (closeBtn) {
      closeBtn.addEventListener(&#x27;click&#x27;, function(e) {
        e.preventDefault();
        closePanel();
      });
    }

    document.addEventListener(&#x27;click&#x27;, function(e) {
      var panel = document.getElementById(&#x27;cart-widget-panel&#x27;);
      var btn = document.getElementById(&#x27;cart-widget-btn&#x27;);
      if (panelOpen &amp;&amp; panel &amp;&amp; btn) {
        if (!panel.contains(e.target) &amp;&amp; !btn.contains(e.target)) {
          closePanel();
        }
      }
    });

    updateBadge();

    if (getCartCount() &gt; 0 &amp;&amp; btn) {
      btn.style.display = &#x27;flex&#x27;;
    }
  }

  window.CartWidget = {
    update: function() {
      updateBadge();
      renderWidgetItems();
    },
    show: function(itemName, qty) {
      updateBadge();
      showWidgetToast(itemName, qty);
    },
    openPanel: openPanel,
    closePanel: closePanel,
    toggle: togglePanel
  };

  if (document.readyState === &#x27;loading&#x27;) {
    document.addEventListener(&#x27;DOMContentLoaded&#x27;, initCartWidget);
  } else {

<h2>cart-widget.css (545 lines)</h2>
<textarea id="cart-widget.css" rows="10" cols="120" style="width:100%;font-family:monospace;font-size:12px;">/* ============================================
Ramen Jin - Floating Cart Widget Styles
============================================ */

/* Floating Cart Button */
#cart-widget-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 9999;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #d4a24e, #c4872e);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  font-family: inherit;
}

#cart-widget-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}

#cart-widget-btn:active {
  transform: scale(0.95);
}

/* Cart Icon SVG */
#cart-widget-btn svg {
  width: 28px;
  height: 28px;
  fill: #fff;
}

/* Item Count Badge */
#cart-widget-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: #e74c3c;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  min-width: 22px;
  height: 22px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
  line-height: 1;
  font-family: Arial, Helvetica, sans-serif;
}

#cart-widget-badge.hidden {
  display: none;
}

/* Cart Summary Panel */
#cart-widget-panel {
  position: fixed;
  bottom: 100px;
  right: 30px;
  z-index: 9998;
  width: 340px;
  max-height: 420px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  display: none;
  flex-direction: column;
  overflow: hidden;
  font-family: &quot;Segoe UI&quot;, Tahoma, Geneva, Verdana, sans-serif;
  animation: cartPanelSlideIn 0.3s ease;
}

#cart-widget-panel.open {
  display: flex;
}

@keyframes cartPanelSlideIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Panel Header */
.cart-widget-header {
  padding: 16px 18px;
  background: linear-gradient(135deg, #d4a24e, #c4872e);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.cart-widget-header h3 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.cart-widget-close {
  background: none;
  border: none;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  opacity: 0.8;
  transition: opacity 0.2s;
}

.cart-widget-close:hover {
  opacity: 1;
}

/* Panel Items List */
.cart-widget-items {
  flex: 1;
  overflow-y: auto;
  padding: 12px 18px;
  max-height: 240px;
}

.cart-widget-items::-webkit-scrollbar {
  width: 6px;
}

.cart-widget-items::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 3px;
}

.cart-widget-empty {
  color: #999;
  text-align: center;
  padding: 30px 10px;
  font-size: 14px;
}

.cart-widget-empty svg {
  width: 40px;
  height: 40px;
  fill: #555;
  margin-bottom: 10px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

/* Individual Cart Item */
.cart-widget-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #2a2a2a;
}

.cart-widget-item:last-child {
  border-bottom: none;
}

.cart-widget-item-info {
  flex: 1;
  min-width: 0;
}

.cart-widget-item-name {
  color: #eee;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}

.cart-widget-item-details {
  color: #999;
  font-size: 12px;
  margin-top: 2px;
}

.cart-widget-item-price {
  color: #d4a24e;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  margin-left: 12px;
}

/* Panel Footer */
.cart-widget-footer {
  padding: 14px 18px;
  border-top: 1px solid #333;
  background: #1a1a1a;
  flex-shrink: 0;
}

.cart-widget-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
}

.cart-widget-total-amount {
  color: #d4a24e;
  font-size: 18px;
}

.cart-widget-order-btn {
  display: block;
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #d4a24e, #c4872e);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 0.5px;
}

.cart-widget-order-btn:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

.cart-widget-order-btn:active {
  transform: translateY(0);
}

/* Pulse animation when item added */
@keyframes cartPulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.25); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

#cart-widget-btn.pulse {
  animation: cartPulse 0.5s ease;
}

/* Responsive */
@media (max-width: 480px) {
  #cart-widget-btn {
    bottom: 20px;
    right: 20px;
    width: 52px;
    height: 52px;
  }

  #cart-widget-panel {
    right: 10px;
    left: 10px;
    bottom: 85px;
    width: auto;
  }

  .cart-widget-item-name {
    max-width: 140px;
  }
}


/* Toast Notification */
.cart-widget-toast {
  position: fixed;
  bottom: 140px;
  right: 30px;
  z-index: 10000;
  background: #1a1a1a;
  border: 1px solid #333;
  border-left: 4px solid #4ade80;
  border-radius: 12px;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  opacity: 0;
  transform: translateY(20px) scale(0.95);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  max-width: 340px;
}

.cart-widget-toast-show {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.cart-widget-toast-icon {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: rgba(74, 222, 128, 0.15);
  border-radius: 50%;
}

.cart-widget-toast-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cart-widget-toast-text strong {
  color: #fff;
  font-size: 14px;
}

.cart-widget-toast-text span {
  color: #aaa;
  font-size: 12px;
}

/* Widget Header */
.cart-widget-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid #333;
  background: linear-gradient(135deg, #1a1a1a, #222);
}

.cart-widget-title {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
}

.cart-widget-close-btn {
  background: none;
  border: none;
  color: #888;
  font-size: 24px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.2s, transform 0.2s;
}

.cart-widget-close-btn:hover {
  color: #ff4444;
  transform: scale(1.2);
}

/* Widget Items Container */
.cart-widget-items {
  max-height: 220px;
  overflow-y: auto;
  padding: 8px 0;
}

.cart-widget-items::-webkit-scrollbar {
  width: 4px;
}

.cart-widget-items::-webkit-scrollbar-track {
  background: transparent;
}

.cart-widget-items::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 2px;
}

/* Remove Button */
.cart-widget-remove-btn {
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  padding: 6px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.cart-widget-remove-btn:hover {
  color: #ff4444;
  background: rgba(255, 68, 68, 0.1);
}

/* Footer */
.cart-widget-footer {
  border-top: 1px solid #333;
  padding: 12px 16px;
  background: linear-gradient(135deg, #1a1a1a, #222);
}

.cart-widget-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
}

.cart-widget-total span:last-child {
  color: #c8102e;
  font-size: 18px;
  font-weight: 700;
}

/* Action Buttons */
.cart-widget-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.cart-widget-action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 8px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: none;
  text-align: center;
}

.cart-widget-action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.cart-widget-view {
  background: transparent;
  border: 1px solid #555 !important;
  color: #ddd;
}

.cart-widget-view:hover {
  border-color: #888 !important;
  color: #fff;
  background: rgba(255, 255, 255, 0.05);
}

.cart-widget-checkout {
  background: linear-gradient(135deg, #c8102e, #e8192e);
  color: #fff;
}

.cart-widget-checkout:hover {
  background: linear-gradient(135deg, #d4203a, #f02040);
}

/* Empty State */
.cart-widget-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 16px;
  color: #666;
  font-family: Arial, Helvetica, sans-serif;
  text-align: center;
}

.cart-widget-empty p:first-child {
  font-size: 15px;
  margin: 0 0 4px 0;
  color: #999;
}

/* Panel slide animations */
.cart-widget-panel-hidden {
  opacity: 0;
  transform: translateY(20px) scale(0.95);
  pointer-events: none;
  visibility: hidden;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.cart-widget-panel-visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
  visibility: visible;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Responsive toast */
@media (max-width: 480px) {
  .cart-widget-toast {
    right: 10px;
    bottom: 120px;
    left: 10px;
    max-width: none;
  }
  .cart-widget-actions {
    flex-direction: column;
  }
}
