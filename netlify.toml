[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/payment/create-intent"
  to = "/.netlify/functions/create-payment-intent"
  status = 200

[[redirects]]
  from = "/api/payment/webhook"
  to = "/.netlify/functions/handle-webhook"
  status = 200

[[headers]]
  for = "/server/*"
  [headers.values]
    X-Robots-Tag = "noindex"
    X-Content-Type-Options = "nosniff"
